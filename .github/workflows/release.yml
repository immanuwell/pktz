name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir dist
          GOOS=linux GOARCH=amd64   go build -ldflags="-s -w" -o dist/pktz-linux-amd64   .
          GOOS=linux GOARCH=arm64   go build -ldflags="-s -w" -o dist/pktz-linux-arm64   .
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o dist/pktz-linux-armv7 .

      - name: Create GitHub release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ github.token }}
